<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Sentinel</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Phosphor Icons - lightweight icon library -->
    <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- ==================== SIDEBAR NAVIGATION ==================== -->
    <nav class="sidebar">
        <!-- App branding -->
        <div class="sidebar-brand">
            <div class="brand-icon">
                <i class="ph ph-kanban"></i>
            </div>
            <span class="brand-name">KanDo</span>
        </div>

        <!-- Navigation links -->
        <ul class="nav-links">
            <li>
                <a href="#" class="nav-link active" data-view="board">
                    <i class="ph ph-columns"></i>
                    <span>Board</span>
                </a>
            </li>
        </ul>

        <!-- Sidebar footer -->
        <div class="sidebar-footer">
            <p class="footer-text">Built with Python, Flask, SQLAlchemy &amp; JavaScript by <span class="footer-author">Ghaleb Khadra</span> &middot; {{ current_year }}</p>
        </div>
    </nav>

    <!-- ==================== MAIN CONTENT AREA ==================== -->
    <main class="main-content">

        <!-- Top toolbar -->
        <header class="toolbar">
            <div class="toolbar-left">
                <h1 class="page-title">Board</h1>
            </div>
            <div class="toolbar-right">
                <!-- Filter and search controls -->
                <div class="filter-group">
                    <!-- Priority dropdown filter -->
                    <div class="dropdown" id="priorityDropdown">
                        <button class="filter-btn" id="filterPriority">
                            <i class="ph ph-funnel"></i> Priority
                        </button>
                        <div class="dropdown-menu">
                            <div class="dropdown-item" data-value="">All Priorities</div>
                            <div class="dropdown-item" data-value="High">
                                <span class="priority-dot high"></span> High
                            </div>
                            <div class="dropdown-item" data-value="Medium">
                                <span class="priority-dot medium"></span> Medium
                            </div>
                            <div class="dropdown-item" data-value="Low">
                                <span class="priority-dot low"></span> Low
                            </div>
                        </div>
                    </div>

                    <!-- Tags dropdown filter -->
                    <div class="dropdown" id="tagsDropdown">
                        <button class="filter-btn" id="filterTags">
                            <i class="ph ph-tag"></i> Tags
                        </button>
                        <div class="dropdown-menu" id="tagsDropdownMenu">
                            <div class="dropdown-item" data-value="">All Tags</div>
                            <!-- Tag options will be injected by JavaScript -->
                        </div>
                    </div>

                    <div class="search-box">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="Search tasks...">
                    </div>
                </div>

                <!-- Create New Task button -->
                <button class="btn-primary" id="addTaskBtn">
                    <i class="ph ph-plus"></i> New Task
                </button>
            </div>
        </header>

        <!-- ==================== KANBAN BOARD ==================== -->
        <div class="board-container">
            <!-- To Do Column -->
            <div class="kanban-column" data-status="To Do">
                <div class="column-header">
                    <div class="column-title">
                        <span class="status-dot todo"></span>
                        <h2>To Do</h2>
                        <span class="task-count" id="countTodo">0</span>
                    </div>
                </div>
                <div class="task-list" data-status="To Do">
                    <!-- Task cards will be injected here by JavaScript -->
                </div>
            </div>

            <!-- In Progress Column -->
            <div class="kanban-column" data-status="In Progress">
                <div class="column-header">
                    <div class="column-title">
                        <span class="status-dot in-progress"></span>
                        <h2>In Progress</h2>
                        <span class="task-count" id="countInProgress">0</span>
                    </div>
                </div>
                <div class="task-list" data-status="In Progress">
                    <!-- Task cards will be injected here by JavaScript -->
                </div>
            </div>

            <!-- Done Column -->
            <div class="kanban-column" data-status="Done">
                <div class="column-header">
                    <div class="column-title">
                        <span class="status-dot done"></span>
                        <h2>Done</h2>
                        <span class="task-count" id="countDone">0</span>
                    </div>
                </div>
                <div class="task-list" data-status="Done">
                    <!-- Task cards will be injected here by JavaScript -->
                </div>
            </div>
        </div>
    </main>

    <!-- ==================== CREATE TASK MODAL ==================== -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">New Task</h2>
                <button class="modal-close" id="closeModal">
                    <i class="ph ph-x"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="taskTitle">Title</label>
                    <input type="text" id="taskTitle" placeholder="What needs to be done?">
                </div>
                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" rows="3" placeholder="Add details..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskStatus">Status</label>
                        <select id="taskStatus">
                            <option value="To Do" selected>To Do</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Done">Done</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskDueDate">Due Date</label>
                        <input type="date" id="taskDueDate">
                    </div>
                </div>
                <div class="form-group">
                    <label>Tags</label>
                    <div class="tag-selector-wrapper">
                        <!-- Selected tags appear as removable pills here -->
                        <div class="selected-tags" id="selectedTagsDisplay"></div>
                        <!-- Add tag dropdown trigger -->
                        <div class="dropdown" id="tagSelectorDropdown">
                            <button type="button" class="add-tag-btn" id="addTagDropdownBtn">
                                <i class="ph ph-plus"></i> Add Tag
                            </button>
                            <div class="dropdown-menu" id="tagSelectorMenu">
                                <div class="dropdown-search">
                                    <input type="text" id="tagSearchInput" placeholder="Search tags...">
                                </div>
                                <div class="dropdown-list" id="tagDropdownList">
                                    <!-- Tag options injected by JavaScript -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelTask">Cancel</button>
                <button class="btn-primary" id="saveTask">Create Task</button>
            </div>
        </div>
    </div>

    <!-- ==================== TASK DETAIL SLIDE-OUT PANEL ==================== -->
    <div class="slide-panel-overlay" id="detailOverlay">
        <div class="slide-panel" id="detailPanel">
            <div class="panel-header">
                <h2 id="detailTitle">Task Details</h2>
                <div class="panel-actions">
                    <button class="icon-btn" id="editTaskBtn" title="Edit task">
                        <i class="ph ph-pencil-simple"></i>
                    </button>
                    <button class="icon-btn danger" id="deleteTaskBtn" title="Delete task">
                        <i class="ph ph-trash"></i>
                    </button>
                    <button class="icon-btn" id="closePanel">
                        <i class="ph ph-x"></i>
                    </button>
                </div>
            </div>
            <div class="panel-body">
                <div class="detail-field">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" id="detailStatus"></span>
                </div>
                <div class="detail-field">
                    <span class="detail-label">Priority</span>
                    <span class="detail-value" id="detailPriority"></span>
                </div>
                <div class="detail-field">
                    <span class="detail-label">Due Date</span>
                    <span class="detail-value" id="detailDueDate"></span>
                </div>
                <div class="detail-field">
                    <span class="detail-label">Description</span>
                    <p class="detail-description" id="detailDescription"></p>
                </div>
                <div class="detail-field">
                    <span class="detail-label">Tags</span>
                    <div class="detail-tags" id="detailTags"></div>
                </div>
                <div class="detail-field">
                    <span class="detail-label">Created</span>
                    <span class="detail-value" id="detailCreated"></span>
                </div>
                <div class="detail-field">
                    <span class="detail-label">Updated</span>
                    <span class="detail-value" id="detailUpdated"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== TOAST NOTIFICATIONS ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- SortableJS - handles drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
